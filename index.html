<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Final Debug</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #222; overflow: hidden; }
        #ComposeTarget { 
            width: 100vw !important; 
            height: 100vh !important; 
            display: block; 
            background-color: red; /* Αν το δεις κόκκινο, το canvas είναι οκ */
        }
    </style>
</head>
<body>
    <canvas id="main""></canvas>

    <script type="module">
        const canvas = document.getElementById("ComposeTarget");
        if (canvas) {
            console.log("✅ Το Canvas βρέθηκε με ID 'ComposeTarget'");
            console.log("Διαστάσεις Canvas:", canvas.clientWidth, "x", canvas.clientHeight);
        } else {
            console.error("❌ ΤΟ CANVAS ΔΕΝ ΒΡΕΘΗΚΕ! Ελέγξτε το ID.");
        }

        import("./app.js").then(() => {
            console.log("🚀 Το app.js ξεκίνησε!");
        }).catch(err => console.error("Σφάλμα app.js:", err));
    </script>
</body>
</html>
