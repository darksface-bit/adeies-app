<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Debug Διαχείριση Αδειών</title>
    <script src="coi-serviceworker.js"></script>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; background-color: #222; } /* Σκούρο φόντο για να ξέρουμε αν άλλαξε κάτι */
        #ComposeTarget { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="ComposeTarget"></canvas>
    
    <script type="module">
        console.log("Προσπάθεια εκκίνησης app.js...");
        import("./app.js").then(() => {
            console.log("Το app.js φορτώθηκε επιτυχώς!");
        }).catch((err) => {
            console.error("ΣΦΑΛΜΑ κατά τη φόρτωση του app.js:", err);
        });
    </script>
</body>
</html>
